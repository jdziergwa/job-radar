# companies.yaml — companies to scrape directly via their ATS
# Add entries under the ATS platform key (greenhouse, lever, ashby, workable).
# The "slug" is the company's identifier in that ATS URL.
# Find it by visiting jobs.lever.co/<slug> or boards.greenhouse.io/<slug> etc.
#
# Copy this file to profiles/default/companies.yaml and customise.

